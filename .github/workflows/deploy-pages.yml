# Deploy static site to GitHub Pages (Actions source — not the legacy gh-pages branch bot).
# After merge: Settings → Pages → Build and deployment → Source → GitHub Actions.
# See: https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Verify secret is injected
        env:
          VITE_SOCKET_URL: ${{ secrets.SOCKET_SERVER_URL }}
        run: |
          if [ -z "$VITE_SOCKET_URL" ]; then
            echo "SOCKET_SERVER_URL is EMPTY"
            exit 1
          fi
          echo "SOCKET_SERVER_URL detected"

      - run: npm ci

      - name: Build static site
        env:
          VITE_SOCKET_URL: ${{ secrets.SOCKET_SERVER_URL }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
