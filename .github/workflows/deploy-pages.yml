name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Until third-party actions ship Node 24 builds, opt JS actions off deprecated Node 20.
      # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Verify secret is injected
        env:
          VITE_SOCKET_URL: ${{ secrets.SOCKET_SERVER_URL }}
        run: |
          if [ -z "$VITE_SOCKET_URL" ]; then
            echo "SOCKET_SERVER_URL is EMPTY"
            exit 1
          fi
          echo "SOCKET_SERVER_URL detected"

      - name: Build static site
        env:
          VITE_SOCKET_URL: ${{ secrets.SOCKET_SERVER_URL }}
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist