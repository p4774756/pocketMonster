name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Verify secret is injected
        env:
          VITE_SOCKET_URL: ${{ secrets.SOCKET_SERVER_URL }}
        run: |
          if [ -z "$VITE_SOCKET_URL" ]; then
            echo "SOCKET_SERVER_URL is EMPTY"
            exit 1
          fi
          echo "SOCKET_SERVER_URL detected"

      - name: Build static site
        env:
          VITE_SOCKET_URL: ${{ secrets.SOCKET_SERVER_URL }}
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist