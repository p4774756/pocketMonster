<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>Pocket &#x96fb;&#x5b50;&#x5bf5;&#x7269;</title>
  </head>
  <body>
    <div id="app" class="app-root">
      <header class="theme-bar" aria-label="介面風格">
        <span class="app-version" id="app-version" translate="no"></span>
        <div class="theme-bar-actions">
          <span class="theme-bar-label">風格</span>
          <select id="theme-select" class="theme-select" aria-label="切換介面風格">
            <option value="soft">柔和漸層</option>
            <option value="retro">復古液晶</option>
            <option value="minimal">極簡黑白</option>
          </select>
          <button type="button" class="theme-rules-btn" id="btn-game-rules">遊戲說明</button>
          <button type="button" class="theme-rules-btn" id="btn-feedback">意見回饋</button>
        </div>
      </header>
      <main id="view-root" class="view-root"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
